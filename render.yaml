services:
  - type: web
    name: exe201-api
    runtime: node
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: WEBAUTHN_RP_ID
        sync: false
      - key: WEBAUTHN_RP_NAME
        value: TeaFlow BobaPOS
